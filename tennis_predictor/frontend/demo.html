<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .match-card { transition: transform 0.2s; cursor: pointer; }
        .match-card:hover { transform: scale(1.02); }
        .match-card:active { transform: scale(0.98); }
        .tab { transition: all 0.2s; }
        .tab.active { background-color: #3b82f6; color: white; }
        .prob-bar { transition: width 0.5s ease-in-out; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" class="p-4 max-w-lg mx-auto">
        <!-- Home Screen -->
        <div id="home-screen">
            <div class="bg-blue-600 text-white p-4 -mx-4 -mt-4 mb-4 rounded-b-xl shadow-lg">
                <h1 class="text-2xl font-bold">🎾 Tennis Predictor</h1>
                <p class="text-sm text-blue-200">AI предсказания теннисных матчей</p>
            </div>
            
            <h2 class="text-lg font-semibold mb-3 text-gray-700">📅 Сегодняшние матчи</h2>
            <div id="matches-list" class="space-y-3">
                <!-- Matches will be inserted here -->
            </div>
        </div>

        <!-- Prediction Screen -->
        <div id="prediction-screen" class="hidden">
            <div class="flex items-center mb-4">
                <button onclick="goHome()" class="text-blue-500 mr-2">←</button>
                <h1 class="text-xl font-bold">Предсказание матча</h1>
            </div>
            <div id="prediction-content" class="fade-in"></div>
        </div>
    </div>

    <script>
        const matches = [
            { id: 1, playerA: 'Джокович Н.', playerB: 'Алькарас К.', tournament: 'ATP Finals', surface: 'Hard', time: '14:00', flagA: '🇷🇸', flagB: '🇪🇸' },
            { id: 2, playerA: 'Синнер Я.', playerB: 'Медведев Д.', tournament: 'ATP Finals', surface: 'Hard', time: '16:30', flagA: '🇮🇹', flagB: '🇷🇺' },
            { id: 3, playerA: 'Рублёв А.', playerB: 'Циципас С.', tournament: 'ATP 500', surface: 'Clay', time: '18:00', flagA: '🇷🇺', flagB: '🇬🇷' },
        ];

        const predictions = {
            1: {
                matchWinner: { probA: 62, probB: 38 },
                totalGames: { line: 22.5, over: 58, under: 42 },
                handicap: { line: -3.5, playerA: 55, playerB: 45 },
                sets: { '2-0': 35, '2-1': 27, '1-2': 23, '0-2': 15 },
                firstSet: { playerA: 58, playerB: 42 },
                confidence: 75,
                reasoning: {
                    form: 'Джокович в отличной форме - 5 побед подряд, выиграл 85% подач. Алькарас проиграл последний матч на этом покрытии.',
                    h2h: 'Личные встречи: 3-2 в пользу Джоковича. На харде Джокович выиграл все 3 матча.',
                    sentiment: 'Sentiment соцсетей положительный для Джоковича (0.75). У Алькараса есть вопросы по физической форме.',
                    stats: 'Эйс-процент: Джокович 8.5 за матч vs Алькарас 6.2. Двойные ошибки: 2.1 vs 3.0.',
                    conclusion: 'Рекомендация: Побе Джоковича + тотал меньше 23.5 геймов.'
                }
            },
            2: {
                matchWinner: { probA: 55, probB: 45 },
                totalGames: { line: 23.5, over: 62, under: 38 },
                handicap: { line: -2.5, playerA: 52, playerB: 48 },
                sets: { '2-0': 28, '2-1': 27, '1-2': 25, '0-2': 20 },
                firstSet: { playerA: 53, playerB: 47 },
                confidence: 60,
                reasoning: {
                    form: 'Синнер показывает стабильную игру - 4 победы в последних 5 матчах. Медведев восстанавливается после травмы.',
                    h2h: 'Личные встречи: 2-2. Последний матч был 5-сетовым триллером.',
                    sentiment: 'Нейтральный sentiment для обоих игроков. Ожидается равный матч.',
                    stats: 'Оба игрока показывают высокий процент выигранных подач (70%+). Вероятен тотал больше.',
                    conclusion: 'Рекомендация: Тотал больше 23.5 геймов.'
                }
            },
            3: {
                matchWinner: { probA: 48, probB: 52 },
                totalGames: { line: 21.5, over: 51, under: 49 },
                handicap: { line: 1.5, playerA: 58, playerB: 42 },
                sets: { '2-0': 22, '2-1': 26, '1-2': 28, '0-2': 24 },
                firstSet: { playerA: 47, playerB: 53 },
                confidence: 55,
                reasoning: {
                    form: 'Рублёв на грунте показывает 60% побед. Циципас сильнее на этом покрытии - 70% побед.',
                    h2h: 'Личные встречи: 4-3 в пользу Циципаса. На грунте Циципас выиграл 3 из 4.',
                    sentiment: 'Позитивный sentiment для Циципаса после недавнего турнира. Рублёв под давлением.',
                    stats: 'Циципас лучше принимает подачу (38% vs 32%). Это ключевой фактор на грунте.',
                    conclusion: 'Рекомендация: Побе Циципаса с форой (+1.5).'
                }
            },
        };

        function renderMatches() {
            const container = document.getElementById('matches-list');
            container.innerHTML = matches.map(m => `
                <div class="match-card bg-white p-4 rounded-xl shadow-sm border border-gray-100" onclick="showPrediction(${m.id})">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded">${m.tournament}</span>
                        <span class="text-xs text-gray-400">${m.surface} • ${m.time}</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex-1">
                            <div class="flex items-center mb-2">
                                <span class="text-lg mr-2">${m.flagA}</span>
                                <span class="font-medium">${m.playerA}</span>
                            </div>
                            <div class="text-xs text-gray-400 text-center my-1">vs</div>
                            <div class="flex items-center">
                                <span class="text-lg mr-2">${m.flagB}</span>
                                <span class="font-medium">${m.playerB}</span>
                            </div>
                        </div>
                        <div class="text-blue-500 text-sm ml-4">→</div>
                    </div>
                </div>
            `).join('');
        }

        function showPrediction(matchId) {
            const match = matches.find(m => m.id === matchId);
            const pred = predictions[matchId];
            
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('prediction-screen').classList.remove('hidden');
            
            document.getElementById('prediction-content').innerHTML = `
                <!-- Match Header -->
                <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100">
                    <div class="text-xs text-gray-500 mb-2">${match.tournament} • ${match.surface}</div>
                    <div class="flex items-center justify-between">
                        <div class="text-center flex-1">
                            <div class="text-3xl mb-1">${match.flagA}</div>
                            <div class="font-medium text-sm">${match.playerA}</div>
                        </div>
                        <div class="text-gray-400 text-xl px-4">vs</div>
                        <div class="text-center flex-1">
                            <div class="text-3xl mb-1">${match.flagB}</div>
                            <div class="font-medium text-sm">${match.playerB}</div>
                        </div>
                    </div>
                </div>

                <!-- Confidence Badge -->
                <div class="bg-gradient-to-r from-blue-500 to-blue-600 p-4 rounded-xl shadow-sm mb-4 text-white">
                    <div class="text-sm text-blue-100 mb-1">Уверенность прогноза</div>
                    <div class="text-4xl font-bold">${pred.confidence}%</div>
                    <div class="w-full bg-blue-400 rounded-full h-2 mt-2">
                        <div class="bg-white h-2 rounded-full prob-bar" style="width: ${pred.confidence}%"></div>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="flex space-x-2 mb-4 bg-white p-1 rounded-xl shadow-sm">
                    <button class="tab active flex-1 py-2 px-3 rounded-lg text-sm font-medium" onclick="switchTab(this, 'winner')">Победа</button>
                    <button class="tab flex-1 py-2 px-3 rounded-lg text-sm font-medium text-gray-600" onclick="switchTab(this, 'total')">Тотал</button>
                    <button class="tab flex-1 py-2 px-3 rounded-lg text-sm font-medium text-gray-600" onclick="switchTab(this, 'handicap')">Фора</button>
                    <button class="tab flex-1 py-2 px-3 rounded-lg text-sm font-medium text-gray-600" onclick="switchTab(this, 'reasoning')">Анализ</button>
                </div>

                <!-- Tab Content: Winner -->
                <div id="tab-winner" class="tab-content">
                    <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100">
                        <h3 class="font-semibold mb-4 text-gray-700">🏆 Победитель матча</h3>
                        <div class="space-y-4">
                            <div>
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="flex items-center">${match.flagA} ${match.playerA}</span>
                                    <span class="font-bold text-green-600">${pred.matchWinner.probA}%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-4">
                                    <div class="bg-green-500 h-4 rounded-full prob-bar" style="width: ${pred.matchWinner.probA}%"></div>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="flex items-center">${match.flagB} ${match.playerB}</span>
                                    <span class="font-bold text-red-600">${pred.matchWinner.probB}%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-4">
                                    <div class="bg-red-500 h-4 rounded-full prob-bar" style="width: ${pred.matchWinner.probB}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100">
                        <h3 class="font-semibold mb-3 text-gray-700">📊 Точный счёт</h3>
                        <div class="grid grid-cols-4 gap-2">
                            ${Object.entries(pred.sets).map(([score, prob]) => `
                                <div class="text-center p-2 ${prob >= 25 ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} rounded-lg">
                                    <div class="text-sm font-medium">${score}</div>
                                    <div class="text-xs text-gray-500">${prob}%</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <h3 class="font-semibold mb-3 text-gray-700">🎯 Первый сет</h3>
                        <div class="flex justify-between">
                            <div class="text-center flex-1 p-2 ${pred.firstSet.playerA > 50 ? 'bg-green-50 rounded-l-lg' : ''}">
                                <div class="text-xs text-gray-500">${match.playerA}</div>
                                <div class="font-bold ${pred.firstSet.playerA > 50 ? 'text-green-600' : ''}">${pred.firstSet.playerA}%</div>
                            </div>
                            <div class="text-center flex-1 p-2 ${pred.firstSet.playerB > 50 ? 'bg-green-50 rounded-r-lg' : ''}">
                                <div class="text-xs text-gray-500">${match.playerB}</div>
                                <div class="font-bold ${pred.firstSet.playerB > 50 ? 'text-green-600' : ''}">${pred.firstSet.playerB}%</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab Content: Total -->
                <div id="tab-total" class="tab-content hidden">
                    <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100">
                        <h3 class="font-semibold mb-4 text-gray-700">📊 Тотал геймов</h3>
                        <div class="text-center mb-4">
                            <div class="text-3xl font-bold text-blue-600">${pred.totalGames.line}</div>
                            <div class="text-sm text-gray-500">линия тотала</div>
                        </div>
                        <div class="space-y-4">
                            <div class="p-3 ${pred.totalGames.over > 50 ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} rounded-lg">
                                <div class="flex justify-between items-center">
                                    <span class="font-medium">Больше (${pred.totalGames.line})</span>
                                    <span class="text-xl font-bold ${pred.totalGames.over > 50 ? 'text-green-600' : ''}">${pred.totalGames.over}%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-3 mt-2">
                                    <div class="bg-green-500 h-3 rounded-full prob-bar" style="width: ${pred.totalGames.over}%"></div>
                                </div>
                            </div>
                            <div class="p-3 ${pred.totalGames.under > 50 ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} rounded-lg">
                                <div class="flex justify-between items-center">
                                    <span class="font-medium">Меньше (${pred.totalGames.line})</span>
                                    <span class="text-xl font-bold ${pred.totalGames.under > 50 ? 'text-green-600' : ''}">${pred.totalGames.under}%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-3 mt-2">
                                    <div class="bg-red-500 h-3 rounded-full prob-bar" style="width: ${pred.totalGames.under}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab Content: Handicap -->
                <div id="tab-handicap" class="tab-content hidden">
                    <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100">
                        <h3 class="font-semibold mb-4 text-gray-700">⚖️ Фора</h3>
                        <div class="text-center mb-4">
                            <div class="text-3xl font-bold text-blue-600">${pred.handicap.line > 0 ? '+' : ''}${pred.handicap.line}</div>
                            <div class="text-sm text-gray-500">линия форы</div>
                        </div>
                        <div class="space-y-4">
                            <div class="p-3 ${pred.handicap.playerA > 50 ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} rounded-lg">
                                <div class="flex justify-between items-center">
                                    <span class="font-medium">${match.flagA} ${match.playerA} (${pred.handicap.line > 0 ? '+' : ''}${pred.handicap.line})</span>
                                    <span class="text-xl font-bold ${pred.handicap.playerA > 50 ? 'text-green-600' : ''}">${pred.handicap.playerA}%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-3 mt-2">
                                    <div class="bg-green-500 h-3 rounded-full prob-bar" style="width: ${pred.handicap.playerA}%"></div>
                                </div>
                            </div>
                            <div class="p-3 ${pred.handicap.playerB > 50 ? 'bg-green-50 border border-green-200' : 'bg-gray-50'} rounded-lg">
                                <div class="flex justify-between items-center">
                                    <span class="font-medium">${match.flagB} ${match.playerB} (${pred.handicap.line > 0 ? '+' : ''}${pred.handicap.line * -1})</span>
                                    <span class="text-xl font-bold ${pred.handicap.playerB > 50 ? 'text-green-600' : ''}">${pred.handicap.playerB}%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-3 mt-2">
                                    <div class="bg-red-500 h-3 rounded-full prob-bar" style="width: ${pred.handicap.playerB}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab Content: Reasoning -->
                <div id="tab-reasoning" class="tab-content hidden">
                    <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100">
                        <h3 class="font-semibold mb-4 text-gray-700">🤖 Обоснование прогноза</h3>
                        
                        <div class="space-y-4">
                            <div class="p-3 bg-blue-50 rounded-lg">
                                <div class="flex items-start">
                                    <span class="text-xl mr-2">📈</span>
                                    <div>
                                        <div class="font-medium text-sm text-blue-700 mb-1">Текущая форма</div>
                                        <div class="text-sm text-gray-700">${pred.reasoning.form}</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="p-3 bg-purple-50 rounded-lg">
                                <div class="flex items-start">
                                    <span class="text-xl mr-2">⚔️</span>
                                    <div>
                                        <div class="font-medium text-sm text-purple-700 mb-1">Личные встречи</div>
                                        <div class="text-sm text-gray-700">${pred.reasoning.h2h}</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="p-3 bg-green-50 rounded-lg">
                                <div class="flex items-start">
                                    <span class="text-xl mr-2">💬</span>
                                    <div>
                                        <div class="font-medium text-sm text-green-700 mb-1">Sentiment анализ</div>
                                        <div class="text-sm text-gray-700">${pred.reasoning.sentiment}</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="p-3 bg-yellow-50 rounded-lg">
                                <div class="flex items-start">
                                    <span class="text-xl mr-2">📊</span>
                                    <div>
                                        <div class="font-medium text-sm text-yellow-700 mb-1">Статистика</div>
                                        <div class="text-sm text-gray-700">${pred.reasoning.stats}</div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="p-4 bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg text-white">
                                <div class="flex items-start">
                                    <span class="text-xl mr-2">🎯</span>
                                    <div>
                                        <div class="font-medium mb-1">Рекомендация</div>
                                        <div class="text-sm text-blue-100">${pred.reasoning.conclusion}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function switchTab(btn, tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active', 'bg-blue-500', 'text-white');
                t.classList.add('text-gray-600');
            });
            btn.classList.add('active');
            btn.classList.remove('text-gray-600');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
        }

        function goHome() {
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('prediction-screen').classList.add('hidden');
        }

        renderMatches();
    </script>
</body>
</html>
